  {id:"stress",    label:"Stress",     lEs:"Estrés",    em:"🌿",c:"#8FC4A0",g:"rgba(143,196,160,0.4)"},
  {id:"loneliness",label:"Loneliness", lEs:"Soledad",   em:"✨",c:"#D4A4C4",g:"rgba(212,164,196,0.4)"},
  {id:"love",      label:"Love",       lEs:"Amor",      em:"❤️",c:"#E4908A",g:"rgba(228,144,138,0.4)"},
  {id:"anger",     label:"Anger",      lEs:"Ira",       em:"🔥",c:"#E4B080",g:"rgba(228,176,128,0.4)"},
  {id:"health",    label:"Health",     lEs:"Salud",     em:"🌱",c:"#A4C880",g:"rgba(164,200,128,0.4)"},
];
const TM={};TABS.forEach(t=>TM[t.id]=t);
const CE=["forgiveness","hope","fear","pain","gratitude","purpose","healing","strength","peace","wisdom","joy","trust"];
const CS=["perdón","esperanza","miedo","dolor","gratitud","propósito","sanación","fortaleza","paz","sabiduría","gozo","confianza"];

let lang="en",actTab=null,sqLast="";
const tidx={};
const lsr={};

function shuf(a,seed){
  const x=[...a];let s=seed==null?Math.floor(Math.random()*99999):seed;
  for(let i=x.length-1;i>0;i--){s=(s*9301+49297)%233280;const j=Math.floor(s/233280*(i+1));[x[i],x[j]]=[x[j],x[i]];}
  return x;
}
function getDV(){
  const d=new Date().getDate()+new Date().getMonth()*31;
  return shuf(B.daily,d)[d%B.daily.length];
}
function nextTV(id){
  if(!tidx[id]){tidx[id]={p:shuf(B[id]),i:0};}
  const t=tidx[id];
  const v=t.p[t.i%t.p.length];
  t.i++;
  if(t.i>=t.p.length){t.p=shuf(B[id]);t.i=0;}
  return v;
}
function searchV(q){
  const ql=q.toLowerCase().trim();
  const ws=ql.split(/\s+/);
  const avoid=lsr[ql];
  for(const m of SMAP){
    if(m.w.some(w=>ws.some(qw=>qw.includes(w)||w.includes(qw)))){
      if(m.r!==avoid){lsr[ql]=m.r;return m;}
    }
  }
  const all=[];
  Object.entries(B).forEach(([k,vs])=>vs.forEach(v=>all.push({...v,_k:k})));
  const scored=all.filter(v=>v.r!==avoid).map(v=>{
    const h=(v.r+" "+v.e+" "+(v.s||"")).toLowerCase();
    const sc=ws.reduce((s,w)=>s+(w.length>2&&h.includes(w)?1:0),0);
    return{v,sc};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc);
  if(scored.length){
    const top=scored.slice(0,Math.min(4,scored.length));
    const pick=top[Math.floor(Math.random()*top.length)].v;
    lsr[ql]=pick.r;return pick;
  }
  const fb=all.filter(v=>v.r!==avoid);
  const pick=fb[Math.floor(Math.random()*fb.length)];
  lsr[ql]=pick.r;return pick;
}

function vt(v){return lang==="es"?(v.s||v.e):v.e}
function pt(v){return lang==="es"?(v.ps||v.p||""):(v.p||"")}
function nt(v){return lang==="es"?(v.ns||v.n||""):(v.n||"")}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function spk(c){
  return [[10,15],[26,26],[42,37],[58,48],[74,59]].map(([l,t],i)=>
    `<div class="sparkle" style="left:${l}%;top:${t}%;background:${c};animation-duration:${1.38+i*.3}s;animation-delay:${i*.2}s"></div>`
  ).join("");
}

function showRC(wrapId,v,label,c,glow,onAnother){
  const pr=pt(v);
  const PL=lang==="es"?"🙏 Comienza tu oración":"🙏 Begin your prayer";
  const AN=lang==="es"?"↻ Otro Versículo":"↻ Another Verse";
  const dv=v.d?`<div class="result-devote">${esc(v.d)}</div>`:"";
  document.getElementById(wrapId).innerHTML=`
    <div class="result-card" style="background:linear-gradient(135deg,${c}18,rgba(60,10,35,.72));border:1px solid ${c}55;box-shadow:0 8px 32px ${c}33">
      <div class="sparkles">${spk(c)}</div>
      <div class="result-label" style="color:${c}">${label} ✦</div>
      <div class="result-verse">"${esc(vt(v))}"</div>
      <div class="result-ref" style="color:${c}">— ${esc(v.r)}</div>
      ${dv}
      ${pr?`<div class="prayer-block" style="border-top:1px solid ${c}28"><div class="prayer-label">${PL}</div><div class="prayer-text">${esc(pr)}</div></div>`:""}
      ${onAnother?`<button class="another-btn" style="border-color:${c}55;color:${c}" onclick="${onAnother}">${AN}</button>`:""}
    </div>`;
}

function renderDV(){
  const v=getDV();const n=nt(v);
  document.getElementById("dc").innerHTML=
    `<div class="daily-vt">"${esc(vt(v))}"</div><div class="daily-vr">${esc(v.r)}</div>${n?`<div class="daily-vn">${esc(n)}</div>`:""}`;
  document.getElementById("dsp").innerHTML=spk("#D4AF6A");
}

function showTV(id){
  const tab=TM[id];if(!tab)return;
  actTab=id;renderTabs();
  const v=nextTV(id);
  const label=lang==="es"?`✦ Una Palabra para Tu ${tab.lEs}`:`✦ A Word for Your ${tab.label}`;
  showRC("tr",v,label,tab.c,tab.g,`showTV('${id}')`);
  setTimeout(()=>document.getElementById("tr").scrollIntoView({behavior:"smooth",block:"nearest"}),80);
}

function doSearch(){
  const q=document.getElementById("si").value.trim();if(!q)return;
  sqLast=q;_search(q);
}
function _search(q){
  const v=searchV(q);
  const c="#C4A4D4";
  const label=lang==="es"?`✦ Para "${esc(q)}"`:`✦ For "${esc(q)}"`;
  document.getElementById("chips").style.display="none";
  showRC("sr",v,label,c,"rgba(196,164,212,0.4)","searchAgain()");
}
function searchAgain(){
  const q=document.getElementById("si").value.trim()||sqLast;
  if(q){delete lsr[q.toLowerCase().trim()];sqLast=q;_search(q);}
}
function onST(){document.getElementById("cb").classList.toggle("show",document.getElementById("si").value.length>0);}
function onSK(e){if(e.key==="Enter"){e.preventDefault();doSearch();}}
function clearS(){
  document.getElementById("si").value="";document.getElementById("cb").classList.remove("show");
  document.getElementById("sr").innerHTML="";document.getElementById("chips").style.display="flex";sqLast="";
}
function chipClick(c){
  document.getElementById("si").value=c;document.getElementById("cb").classList.add("show");
  sqLast=c;delete lsr[c.toLowerCase()];_search(c);
}

function renderTabs(){
  document.getElementById("tg").innerHTML=TABS.map(tab=>{
    const on=actTab===tab.id;
    const lbl=lang==="es"?tab.lEs:tab.label;
    const sub=lang==="es"?`<span class="tab-sub" style="color:${on?tab.c+"77":"rgba(212,175,106,.22)"}">${tab.label}</span>`:"";
    return `<button class="tab-btn" style="background:${on?`linear-gradient(135deg,${tab.c}28,${tab.c}12)`:`linear-gradient(135deg,rgba(50,10,35,.7),rgba(35,8,25,.8))`};border-color:${on?`${tab.c}99`:`rgba(212,175,106,.12)`};box-shadow:${on?`0 4px 18px ${tab.g}`:`none`}" onclick="showTV('${tab.id}')">
      <span class="tab-emoji">${tab.em}</span>
      <span class="tab-label" style="color:${on?tab.c:`rgba(212,175,106,.5)`};font-weight:${on?700:500}">${lbl}${sub}</span>
    </button>`;
  }).join("");
}

function renderChips(){
  const ch=lang==="es"?CS:CE;
  document.getElementById("chips").innerHTML=ch.map(c=>`<button class="chip" onclick="chipClick('${c}')">${c}</button>`).join("");
  document.getElementById("chips").style.display="flex";
}

function switchLang(l){
  if(l===lang)return;lang=l;actTab=null;
  Object.keys(lsr).forEach(k=>delete lsr[k]);
  document.getElementById("btn-en").classList.toggle("active",l==="en");
  document.getElementById("btn-es").classList.toggle("active",l==="es");
  document.getElementById("es-notice").classList.toggle("show",l==="es");
  document.getElementById("app-sub").textContent=l==="es"?"Las Escrituras para Cada Temporada":"Scripture for Every Season";
  document.getElementById("dl").textContent=l==="es"?"✦ Versículo del Día ✦":"✦ Verse of the Day ✦";
  document.getElementById("sl").textContent=l==="es"?"✦ Buscar por Sentimiento ✦":"✦ Search by Feeling or Topic ✦";
  document.getElementById("si").placeholder=l==="es"?"ej. perdón, esperanza, miedo...":"e.g. forgiveness, hope, fear...";
  document.getElementById("sg-btn").textContent=l==="es"?"BUSCAR":"FIND";
  document.getElementById("scl").textContent=l==="es"?"¿Qué hay en tu corazón hoy?":"What\'s on your heart today?";
  document.getElementById("ft").textContent=l==="es"?'"Tu palabra es una lámpara a mis pies." — Salmos 119:105':'"Your word is a lamp to my feet." — Psalm 119:105';
  document.getElementById("tr").innerHTML="";document.getElementById("sr").innerHTML="";
  document.getElementById("si").value="";document.getElementById("cb").classList.remove("show");sqLast="";
  renderTabs();renderChips();renderDV();
}

const GOLD=["#F5D98A","#D4AF6A","#FFE9A0","#C89020","#FFF0B0","#E8C060","#F0D070"];
document.addEventListener("click",e=>{
  const layer=document.getElementById("dust-layer");const frags=[];
  const n=16+Math.floor(Math.random()*14);
  for(let i=0;i<n;i++){
    const el=document.createElement("div");el.className="dust";
    const sz=1.5+Math.random()*4;const col=GOLD[Math.floor(Math.random()*GOLD.length)];
    const ang=Math.random()*Math.PI*2;const dist=25+Math.random()*65;
    const dx=(Math.cos(ang)*dist).toFixed(1);const dy=(Math.sin(ang)*dist-20).toFixed(1);
    const dur=550+Math.random()*750;const delay=Math.random()*100;
    el.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 ${sz*2}px ${col};border-radius:${Math.random()>.35?"50%":"2px"};--dx:${dx}px;--dy:${dy}px;--rot:${Math.floor(Math.random()*360)}deg;--dur:${dur}ms;--delay:${delay}ms;animation-duration:${dur}ms;animation-delay:${delay}ms`;
    layer.appendChild(el);frags.push(el);
  }
  setTimeout(()=>frags.forEach(f=>f.remove()),1600);
});

setTimeout(()=>{
  const s=document.getElementById("splash");s.classList.add("out");
  setTimeout(()=>{
    s.classList.add("gone");
    document.getElementById("app").classList.add("visible");
    renderTabs();renderChips();renderDV();
  },650);
},2600);
</script>
